<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伪声训练器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="panel panel-spectrogram">

      <div id="formantChart"></div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
